name: Despliegue de Puerto Umbral a GitHub Pages (Shinylive)

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar R en la Action
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Instalar dependencias de R para Shinylive
        run: |
          install.packages(c("shinylive", "jsonlite"))
        shell: Rscript {0}

      - name: Compilar aplicación a WebAssembly estático
        run: |
          if (dir.exists("app")) {
            shinylive::export(appdir = "app", destdir = "docs")
          } else {
            stop("No se encontró el directorio 'app'")
          }
        shell: Rscript {0}

      - name: Inyectar etiqueta de verificación de Google en index.html
        run: |
          python3 -c "
          with open('docs/index.html', 'r', encoding='utf-8') as f:
              html = f.read()
          verification_tag = '<meta name=\"google-site-verification\" content=\"2n2kCsOuT24KBkiYLQUUDWmx8JTAdssHeRcJNmswQNE\" />'
          if '</head>' in html:
              html = html.replace('</head>', f'{verification_tag}\n</head>')
              with open('docs/index.html', 'w', encoding='utf-8') as f:
                  f.write(html)
              print('Etiqueta de verificación de Google inyectada en docs/index.html')
          else:
              print('ADVERTENCIA: No se encontró la etiqueta </head> en docs/index.html')
          "

      - name: Personalizar Pantalla de Carga y Reproductor de Podcasts en index.html
        run: |
          cat << 'EOF' > customize_index.py
          with open('docs/index.html', 'r', encoding='utf-8') as f:
              html = f.read()
          
          # Inject direct mobile redirect in <head>
          redirect_script = '<script>if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) { window.location.href = "mobile.html"; }</script>'
          if '<head>' in html:
              html = html.replace('<head>', f'<head>\n{redirect_script}')
              print('Redirect móvil inyectado en <head>')

          custom_loading_html = """
          <style>
            #shinylive-loading {
              display: none !important;
            }
            .loading-container {
              position: fixed;
              top: 0; left: 0; width: 100vw; height: 100vh;
              background: linear-gradient(135deg, #0f172a 0%, #020617 100%) !important;
              display: flex !important;
              flex-direction: column !important;
              align-items: center !important;
              justify-content: center !important;
              font-family: 'Inter', system-ui, -apple-system, sans-serif !important;
              color: #f8fafc !important;
              z-index: 999999 !important;
              padding: 20px !important;
              box-sizing: border-box !important;
            }
            .loading-card {
              background: rgba(30, 41, 59, 0.75);
              border: 1px solid rgba(255, 255, 255, 0.08);
              border-top: 4px solid #0d9488;
              padding: 20px;
              border-radius: 12px;
              max-width: 320px;
              width: 100%;
              box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
              backdrop-filter: blur(12px);
              text-align: center;
            }
            .loading-title {
              font-size: 1.15rem;
              font-weight: 700;
              margin-top: 0;
              margin-bottom: 8px;
              display: flex;
              align-items: center;
              justify-content: center;
              gap: 8px;
              color: #0d9488;
            }
            .loading-title-pulse {
              width: 10px;
              height: 10px;
              background-color: #0d9488;
              border-radius: 50%;
              display: inline-block;
              animation: pulse-loading 1.5s infinite;
            }
            @keyframes pulse-loading {
              0% { transform: scale(0.9); opacity: 1; }
              50% { transform: scale(1.3); opacity: 0.5; }
              100% { transform: scale(0.9); opacity: 1; }
            }
          </style>

          <div class="loading-container" id="custom-loading-container">
            <div class="loading-card">
              <div class="loading-title">
                <span class="loading-title-pulse"></span>
                <span>Puerto Umbral</span>
              </div>
              <div style="font-size: 0.8rem; color: #cbd5e1;">
                Inicializando resolvedor geodésico y mallas de simulación...
              </div>
            </div>
            
            <div style="margin-top: 40px; font-size: 0.72rem; color: #64748b; text-align: center; line-height: 1.5; font-family: 'Inter', sans-serif;">
              Ontología Territorial — Puerto Umbral<br>
              Centro de Investigación Territorio y Cuidado
            </div>
          </div>

          <script>
            (function() {
              // On desktop, auto-remove this overlay once Shiny loads
              var checkShiny = setInterval(function() {
                if (window.Shiny && window.Shiny.shinyapp && window.Shiny.shinyapp.isConnected()) {
                  var el = document.getElementById("custom-loading-container");
                  if (el) el.remove();
                  clearInterval(checkShiny);
                }
              }, 100);
            })();
          </script>
          """
          
          root_tag = '<div style="height: 100vh; width: 100vw" id="root"></div>'
          if root_tag in html:
              new_root = f'<div style="height: 100vh; width: 100vw; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, #0f172a 0%, #020617 100%);" id="root">{custom_loading_html}</div>'
              html = html.replace(root_tag, new_root)
              print('Pantalla de carga inyectada dentro de #root')
          else:
              print('ADVERTENCIA: No se encontró la etiqueta root exacta')
          
          with open('docs/index.html', 'w', encoding='utf-8') as f:
              f.write(html)
          EOF
          python3 customize_index.py

      - name: Evitar Jekyll en GitHub Pages
        run: |
          touch docs/.nojekyll

      - name: Habilitar caching en el Service Worker de Shinylive
        run: |
          sed -i 's/var useCaching = false;/var useCaching = true;/g' docs/shinylive-sw.js

      - name: Evitar que el Service Worker intercepte solicitudes de media o Range (streaming de video)
        run: |
          python3 -c "
          import re
          with open('docs/shinylive-sw.js', 'r', encoding='utf-8') as f:
              code = f.read()
          pattern = r'addEventListener\(\s*[\"\']fetch[\"\']\s*,\s*(?:function\s*\(\s*(\w+)\s*\)|\(\s*(\w+)\s*\)|(\w+))\s*(?:\s*=>)?\s*\{'
          match = re.search(pattern, code)
          if match:
              var_name = next(g for g in match.groups() if g is not None)
              start_idx = match.end()
              bypass_code = f'\n  if ({var_name}.request.url.includes(\"/media/\") || {var_name}.request.url.includes(\".mp3\") || {var_name}.request.url.includes(\".mp4\") || {var_name}.request.url.includes(\".vtt\")) {{\n    return;\n  }}\n'
              code = code[:start_idx] + bypass_code + code[start_idx:]
              with open('docs/shinylive-sw.js', 'w', encoding='utf-8') as f:
                  f.write(code)
              print(f'Bypass de media/range inyectado con éxito en shinylive-sw.js usando variable: {var_name}')
          else:
              print('ADVERTENCIA: No se encontró el listener de fetch en shinylive-sw.js')
          "

      - name: Copiar recursos multimedia, llms.txt y context.json fuera del bundle de R
        run: |
          cp -r media docs/media
          cp -r app/www docs/www
          cp llms.txt docs/llms.txt
          cp llms-full.txt docs/llms-full.txt
          cp context.json docs/context.json
          cp robots.txt docs/robots.txt
          cp sitemap.xml docs/sitemap.xml
          cp BingSiteAuth.xml docs/BingSiteAuth.xml
          mkdir -p docs/.well-known
          cp llms.txt docs/.well-known/llms.txt
          cp app/mobile.html docs/mobile.html

      - name: Subir artefacto para GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
