name: Despliegue de Puerto Umbral a GitHub Pages (Shinylive)

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar R en la Action
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Instalar dependencias de R para Shinylive
        run: |
          install.packages(c("shinylive", "jsonlite"))
        shell: Rscript {0}

      - name: Compilar aplicación a WebAssembly estático
        run: |
          if (dir.exists("app")) {
            shinylive::export(appdir = "app", destdir = "docs")
          } else {
            stop("No se encontró el directorio 'app'")
          }
        shell: Rscript {0}

      - name: Inyectar etiqueta de verificación de Google en index.html
        run: |
          python3 -c "
          with open('docs/index.html', 'r', encoding='utf-8') as f:
              html = f.read()
          verification_tag = '<meta name=\"google-site-verification\" content=\"2n2kCsOuT24KBkiYLQUUDWmx8JTAdssHeRcJNmswQNE\" />'
          if '</head>' in html:
              html = html.replace('</head>', f'{verification_tag}\n</head>')
              with open('docs/index.html', 'w', encoding='utf-8') as f:
                  f.write(html)
              print('Etiqueta de verificación de Google inyectada en docs/index.html')
          else:
              print('ADVERTENCIA: No se encontró la etiqueta </head> en docs/index.html')
          "

      - name: Personalizar Pantalla de Carga y Reproductor de Podcasts en index.html
        run: |
          cat << 'EOF' > customize_index.py
          with open('docs/index.html', 'r', encoding='utf-8') as f:
              html = f.read()
          
          custom_loading_html = """
          <style>
            #shinylive-loading {
              display: none !important;
            }
            .loading-container {
              position: fixed;
              top: 0; left: 0; width: 100vw; height: 100vh;
              background: linear-gradient(135deg, #0f172a 0%, #020617 100%) !important;
              display: flex !important;
              flex-direction: column !important;
              align-items: center !important;
              justify-content: center !important;
              font-family: 'Inter', system-ui, -apple-system, sans-serif !important;
              color: #f8fafc !important;
              z-index: 999999 !important;
              padding: 20px !important;
              box-sizing: border-box !important;
            }
            .loading-card {
              background: rgba(30, 41, 59, 0.75);
              border: 1px solid rgba(255, 255, 255, 0.08);
              border-radius: 12px;
              box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
              backdrop-filter: blur(12px);
              text-align: left;
            }
            .loading-title {
              font-size: 1.25rem;
              font-weight: 700;
              margin-top: 0;
              margin-bottom: 10px;
              display: flex;
              align-items: center;
              gap: 8px;
            }
            .loading-title-pulse {
              width: 10px;
              height: 10px;
              border-radius: 50%;
              display: inline-block;
              animation: pulse-loading 1.5s infinite;
            }
            @keyframes pulse-loading {
              0% { transform: scale(0.9); opacity: 1; }
              50% { transform: scale(1.3); opacity: 0.5; }
              100% { transform: scale(0.9); opacity: 1; }
            }
            .loading-btn {
              padding: 10px 16px;
              border-radius: 8px;
              font-weight: 600;
              text-align: center;
              cursor: pointer;
              transition: all 0.2s ease;
              text-decoration: none;
              display: block;
              font-size: 0.85rem;
              width: 100%;
              box-sizing: border-box;
            }
          </style>

          <div class="loading-container" id="custom-loading-container">
            <div id="loading-content-mount"></div>
            
            <div style="margin-top: 40px; font-size: 0.72rem; color: #64748b; text-align: center; line-height: 1.5; font-family: 'Inter', sans-serif;">
              Ontología Territorial — Puerto Umbral<br>
              Centro de Investigación Territorio y Cuidado
            </div>
          </div>

          <script>
            (function() {
              var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
              var mount = document.getElementById("loading-content-mount");
              if (isMobile) {
                // Render Mobile Disclaimer Card
                mount.innerHTML = `
                  <div class="loading-card" style="border-top: 4px solid #b45309; padding: 25px; max-width: 440px; width: 100%;">
                    <div class="loading-title" style="color: #f59e0b;">
                      <span class="loading-title-pulse" style="background-color: #f59e0b;"></span>
                      <span>⚠️ Dispositivo Móvil Detectado</span>
                    </div>
                    <div style="font-size: 0.85rem; line-height: 1.5; color: #cbd5e1; margin-bottom: 15px;">
                      Esta plataforma utiliza resolvedores geodésicos en WebAssembly no diseñados para celulares o tablets.<br><br>
                      Le invitamos a escuchar los podcasts del Tomo II o leer la obra:
                    </div>
                    
                    <!-- Mobile Podcasts Player -->
                    <div style="margin-top: 5px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 12px; margin-bottom: 15px;">
                      <div style="font-size:0.8rem; font-weight: 600; color: #38bdf8; margin-bottom: 6px; display: flex; align-items: center; gap: 6px;">
                        <span>🎧</span> Podcasts: Diálogos del Manifold
                      </div>
                      <select id="mobile_podcast_select" style="width: 100%; padding: 8px; border-radius: 6px; background: #1e293b; color: white; border: 1px solid #475569; font-size: 0.8rem; margin-bottom: 8px; outline: none;" onchange="document.getElementById('mobile_audio_player').src = this.value; document.getElementById('mobile_audio_player').play();">
                        <option value="podcast1_trauma.mp3">Episodio 1: Física del Trauma (18:57)</option>
                        <option value="podcast2_cuidado.mp3">Episodio 2: Geometría del Cuidado (15:22)</option>
                        <option value="podcast3_terreno.mp3">Episodio 3: Medir la Fricción (23:32)</option>
                      </select>
                      <audio id="mobile_audio_player" controls style="width: 100%; height: 32px;" src="podcast1_trauma.mp3"></audio>
                    </div>

                    <div style="display: flex; flex-direction: column; gap: 8px;">
                      <a href="media/docs/tomo_ii.pdf" class="loading-btn" style="background: #b45309; color: white; border: none;" target="_blank">📖 Leer Tomo II (PDF)</a>
                      <button onclick="document.getElementById('custom-loading-container').remove();" class="loading-btn" style="background: transparent; color: #94a3b8; border: 1px solid #475569;">
                        Intentar forzar carga de la simulación
                      </button>
                    </div>
                  </div>
                `;
              } else {
                // Render Desktop Minimalist Loader
                mount.innerHTML = `
                  <div class="loading-card" style="border-top: 4px solid #0d9488; padding: 20px; max-width: 320px; width: 100%; text-align: center;">
                    <div class="loading-title" style="color: #0d9488; justify-content: center;">
                      <span class="loading-title-pulse" style="background-color: #0d9488;"></span>
                      <span>Puerto Umbral</span>
                    </div>
                    <div style="font-size: 0.8rem; color: #cbd5e1;">
                      Inicializando resolvedor geodésico y mallas de simulación...
                    </div>
                  </div>
                `;
                
                // On desktop, auto-remove this overlay once Shiny loads
                var checkShiny = setInterval(function() {
                  if (window.Shiny && window.Shiny.shinyapp && window.Shiny.shinyapp.isConnected()) {
                    var el = document.getElementById("custom-loading-container");
                    if (el) el.remove();
                    clearInterval(checkShiny);
                  }
                }, 100);
              }
            })();
          </script>
          """
          
          root_tag = '<div style="height: 100vh; width: 100vw" id="root"></div>'
          if root_tag in html:
              new_root = f'<div style="height: 100vh; width: 100vw; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, #0f172a 0%, #020617 100%);" id="root">{custom_loading_html}</div>'
              html = html.replace(root_tag, new_root)
              print('Pantalla de carga inyectada dentro de #root')
          else:
              print('ADVERTENCIA: No se encontró la etiqueta root exacta')
          
          with open('docs/index.html', 'w', encoding='utf-8') as f:
              f.write(html)
          EOF
          python3 customize_index.py

      - name: Evitar Jekyll en GitHub Pages
        run: |
          touch docs/.nojekyll

      - name: Habilitar caching en el Service Worker de Shinylive
        run: |
          sed -i 's/var useCaching = false;/var useCaching = true;/g' docs/shinylive-sw.js

      - name: Evitar que el Service Worker intercepte solicitudes de media o Range (streaming de video)
        run: |
          python3 -c "
          import re
          with open('docs/shinylive-sw.js', 'r', encoding='utf-8') as f:
              code = f.read()
          pattern = r'addEventListener\(\s*[\"\']fetch[\"\']\s*,\s*(?:function\s*\(\s*(\w+)\s*\)|\(\s*(\w+)\s*\)|(\w+))\s*(?:\s*=>)?\s*\{'
          match = re.search(pattern, code)
          if match:
              var_name = next(g for g in match.groups() if g is not None)
              start_idx = match.end()
              bypass_code = f'\n  if ({var_name}.request.url.includes(\"/media/\")) {{\n    return;\n  }}\n'
              code = code[:start_idx] + bypass_code + code[start_idx:]
              with open('docs/shinylive-sw.js', 'w', encoding='utf-8') as f:
                  f.write(code)
              print(f'Bypass de media/range inyectado con éxito en shinylive-sw.js usando variable: {var_name}')
          else:
              print('ADVERTENCIA: No se encontró el listener de fetch en shinylive-sw.js')
          "

      - name: Copiar recursos multimedia, llms.txt y context.json fuera del bundle de R
        run: |
          cp -r media docs/media
          cp llms.txt docs/llms.txt
          cp llms-full.txt docs/llms-full.txt
          cp context.json docs/context.json
          cp robots.txt docs/robots.txt
          cp sitemap.xml docs/sitemap.xml
          cp BingSiteAuth.xml docs/BingSiteAuth.xml
          mkdir -p docs/.well-known
          cp llms.txt docs/.well-known/llms.txt
          cp app/mobile.html docs/mobile.html

      - name: Subir artefacto para GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
