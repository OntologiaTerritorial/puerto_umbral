name: Despliegue de Puerto Umbral a GitHub Pages (Shinylive)

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar R en la Action
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Instalar dependencias de R para Shinylive
        run: |
          install.packages(c("shinylive", "jsonlite"))
        shell: Rscript {0}

      - name: Compilar aplicación a WebAssembly estático
        run: |
          if (dir.exists("app")) {
            shinylive::export(appdir = "app", destdir = "docs")
          } else {
            stop("No se encontró el directorio 'app'")
          }
        shell: Rscript {0}

      - name: Evitar Jekyll en GitHub Pages
        run: |
          touch docs/.nojekyll

      - name: Desplegar a GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs # Carpeta donde se guardó la compilación estática
          branch: gh-pages # Rama de destino para GitHub Pages
          clean: true
