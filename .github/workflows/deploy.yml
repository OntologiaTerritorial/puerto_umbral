name: Despliegue de Puerto Umbral a GitHub Pages (Shinylive)

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar R en la Action
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Instalar dependencias de R para Shinylive
        run: |
          install.packages(c("shinylive", "jsonlite"))
        shell: Rscript {0}

      - name: Compilar aplicación a WebAssembly estático
        run: |
          if (dir.exists("app")) {
            shinylive::export(appdir = "app", destdir = "docs")
          } else {
            stop("No se encontró el directorio 'app'")
          }
        shell: Rscript {0}

      - name: Inyectar etiqueta de verificación de Google en index.html
        run: |
          python3 -c "
          with open('docs/index.html', 'r', encoding='utf-8') as f:
              html = f.read()
          verification_tag = '<meta name=\"google-site-verification\" content=\"2n2kCsOuT24KBkiYLQUUDWmx8JTAdssHeRcJNmswQNE\" />'
          if '</head>' in html:
              html = html.replace('</head>', f'{verification_tag}\n</head>')
              with open('docs/index.html', 'w', encoding='utf-8') as f:
                  f.write(html)
              print('Etiqueta de verificación de Google inyectada en docs/index.html')
          else:
              print('ADVERTENCIA: No se encontró la etiqueta </head> en docs/index.html')
          "

      - name: Personalizar Pantalla de Carga y Reproductor de Podcasts en index.html
        run: |
          python3 -c "
          with open('docs/index.html', 'r', encoding='utf-8') as f:
              html = f.read()
          
          custom_loading_html = '''
          <style>
            #shinylive-loading {
              background: linear-gradient(135deg, #0f172a 0%, #020617 100%) !important;
              display: flex !important;
              flex-direction: column !important;
              align-items: center !important;
              justify-content: center !important;
              font-family: 'Inter', system-ui, -apple-system, sans-serif !important;
              color: #f8fafc !important;
              padding: 20px !important;
              z-index: 999999 !important;
            }
            .shinylive-loading-spinner {
              display: none !important;
            }
            .loading-card {
              background: rgba(30, 41, 59, 0.75);
              border: 1px solid rgba(255, 255, 255, 0.08);
              border-top: 4px solid #0d9488;
              padding: 25px;
              border-radius: 16px;
              max-width: 480px;
              width: 100%;
              box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
              backdrop-filter: blur(12px);
              text-align: left;
            }
            .loading-title {
              font-size: 1.3rem;
              font-weight: 700;
              color: #0d9488;
              margin-top: 0;
              margin-bottom: 12px;
              display: flex;
              align-items: center;
              gap: 10px;
            }
            .loading-title-pulse {
              width: 12px;
              height: 12px;
              background-color: #0d9488;
              border-radius: 50%;
              display: inline-block;
              animation: pulse-loading 1.5s infinite;
            }
            @keyframes pulse-loading {
              0% { transform: scale(0.9); opacity: 1; }
              50% { transform: scale(1.3); opacity: 0.5; }
              100% { transform: scale(0.9); opacity: 1; }
            }
            .loading-text {
              font-size: 0.88rem;
              line-height: 1.5;
              color: #cbd5e1;
              margin-bottom: 18px;
            }
            .loading-btn {
              padding: 10px 16px;
              border-radius: 8px;
              font-weight: 600;
              text-align: center;
              cursor: pointer;
              transition: all 0.2s ease;
              text-decoration: none;
              display: block;
              font-size: 0.85rem;
            }
            .loading-btn-primary {
              background: #0d9488;
              color: white;
              border: none;
            }
            .loading-btn-primary:hover {
              background: #0f766e;
            }
            .loading-btn-secondary {
              background: transparent;
              color: #94a3b8;
              border: 1px solid #475569;
            }
            .loading-btn-secondary:hover {
              color: #f8fafc;
              border-color: #94a3b8;
            }
          </style>

          <div class=\"loading-card\" id=\"custom-loading-card\">
            <div class=\"loading-title\">
              <span class=\"loading-title-pulse\"></span>
              <span id=\"loading-header\">Cargando resolvedores...</span>
            </div>
            <div class=\"loading-text\" id=\"loading-body\">
              Cargando motor matemático R-WebAssembly y mallas de simulación. 
              Este proceso de compilación toma unos segundos. Mientras tanto, le invitamos a escuchar los podcasts del Tomo II:
            </div>
            
            <!-- In-Loading Podcast Player -->
            <div style=\"margin-top: 5px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 12px; margin-bottom: 15px;\">
              <div style=\"font-size:0.82rem; font-weight: 600; color: #38bdf8; margin-bottom: 6px; display: flex; align-items: center; gap: 6px;\">
                <span>🎧</span> Podcasts: Diálogos del Manifold
              </div>
              <select id=\"loading_podcast_select\" style=\"width: 100%; padding: 8px; border-radius: 6px; background: #1e293b; color: white; border: 1px solid #475569; font-size: 0.8rem; margin-bottom: 8px; outline: none;\" onchange=\"document.getElementById('loading_audio_player').src = this.value; document.getElementById('loading_audio_player').play();\">
                <option value=\"podcast1_trauma.mp3\">Episodio 1: Física del Trauma (18:57)</option>
                <option value=\"podcast2_cuidado.mp3\">Episodio 2: Geometría del Cuidado (15:22)</option>
                <option value=\"podcast3_terreno.mp3\">Episodio 3: Medir la Fricción (23:32)</option>
              </select>
              <audio id=\"loading_audio_player\" controls style=\"width: 100%; height: 32px;\" src=\"podcast1_trauma.mp3\"></audio>
            </div>

            <div style=\"display: flex; flex-direction: column; gap: 8px;\">
              <a href=\"media/docs/tomo_ii.pdf\" class=\"loading-btn loading-btn-secondary\" target=\"_blank\">
                📖 Leer Tomo II (PDF)
              </a>
              <div id=\"mobile-only-warning\" style=\"display:none; font-size:0.75rem; color:#f59e0b; text-align:center; margin-top:5px;\">
                ⚠️ Celulares y tablets no soportan la simulación interactiva.
              </div>
            </div>
          </div>

          <script>
            (function() {
              var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
              if (isMobile) {
                // Customize card for mobile layout (disclaimer mode)
                document.getElementById(\"loading-header\").innerText = \"Dispositivo Móvil Detectado\";
                document.getElementById(\"loading-header\").style.color = \"#f59e0b\";
                document.querySelector(\".loading-title-pulse\").style.backgroundColor = \"#f59e0b\";
                document.getElementById(\"custom-loading-card\").style.borderTopColor = \"#f59e0b\";
                document.getElementById(\"loading-body\").innerHTML = \"Esta plataforma utiliza resolvedores geodésicos en WebAssembly <strong>no diseñados para celulares o tablets</strong>.<br><br>Le invitamos a leer la obra o escuchar los podcasts conceptuales desde su dispositivo móvil:\";
                document.getElementById(\"mobile-only-warning\").style.display = \"block\";
                
                // Force overlay to remain visible on mobile even if Shiny loads
                var observer = new MutationObserver(function(mutations) {
                  mutations.forEach(function(mutation) {
                    var el = document.getElementById(\"shinylive-loading\");
                    if (!el) {
                      // Re-create loading overlay if removed
                      location.reload();
                    }
                  });
                });
                observer.observe(document.body, { childList: true });
              }
            })();
          </script>
          '''
          
          if '<div id=\"shinylive-loading\">' in html:
              html = html.replace('<div id=\"shinylive-loading\">', f'<div id=\"shinylive-loading\">{custom_loading_html}')
              with open('docs/index.html', 'w', encoding='utf-8') as f:
                  f.write(html)
              print('Pantalla de carga y reproductor de podcasts inyectados con éxito en docs/index.html')
          else:
              print('ERROR: No se encontró la etiqueta <div id=\"shinylive-loading\"> en docs/index.html')
          "

      - name: Evitar Jekyll en GitHub Pages
        run: |
          touch docs/.nojekyll

      - name: Habilitar caching en el Service Worker de Shinylive
        run: |
          sed -i 's/var useCaching = false;/var useCaching = true;/g' docs/shinylive-sw.js

      - name: Evitar que el Service Worker intercepte solicitudes de media o Range (streaming de video)
        run: |
          python3 -c "
          import re
          with open('docs/shinylive-sw.js', 'r', encoding='utf-8') as f:
              code = f.read()
          pattern = r'addEventListener\(\s*[\"\']fetch[\"\']\s*,\s*(?:function\s*\(\s*(\w+)\s*\)|\(\s*(\w+)\s*\)|(\w+))\s*(?:\s*=>)?\s*\{'
          match = re.search(pattern, code)
          if match:
              var_name = next(g for g in match.groups() if g is not None)
              start_idx = match.end()
              bypass_code = f'\n  if ({var_name}.request.url.includes(\"/media/\")) {{\n    return;\n  }}\n'
              code = code[:start_idx] + bypass_code + code[start_idx:]
              with open('docs/shinylive-sw.js', 'w', encoding='utf-8') as f:
                  f.write(code)
              print(f'Bypass de media/range inyectado con éxito en shinylive-sw.js usando variable: {var_name}')
          else:
              print('ADVERTENCIA: No se encontró el listener de fetch en shinylive-sw.js')
          "

      - name: Copiar recursos multimedia, llms.txt y context.json fuera del bundle de R
        run: |
          cp -r media docs/media
          cp llms.txt docs/llms.txt
          cp llms-full.txt docs/llms-full.txt
          cp context.json docs/context.json
          cp robots.txt docs/robots.txt
          cp sitemap.xml docs/sitemap.xml
          cp BingSiteAuth.xml docs/BingSiteAuth.xml
          mkdir -p docs/.well-known
          cp llms.txt docs/.well-known/llms.txt

      - name: Subir artefacto para GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
